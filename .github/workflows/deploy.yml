name: Deploy Frontend

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/comp3123-frontend
  CONTAINER_NAME: comp3123-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            REACT_APP_API_URL=https://comp3123-backend.ekosenko.me/api/v1

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --network traefik-net \
              --restart unless-stopped \
              --label "traefik.enable=true" \
              --label "traefik.http.routers.comp3123-frontend.rule=Host(\`comp3123-frontend.ekosenko.me\`)" \
              --label "traefik.http.routers.comp3123-frontend.entrypoints=websecure" \
              --label "traefik.http.routers.comp3123-frontend.tls.certresolver=letsencrypt" \
              --label "traefik.http.services.comp3123-frontend.loadbalancer.server.port=3000" \
              ${{ env.IMAGE_NAME }}:latest
            docker image prune -f
